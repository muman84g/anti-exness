version: "3.8"

services:
  # ── Bot 1 (標準設定) ──────────────────────────────────────
  exness-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: exness-bot:latest
    container_name: exness-bot
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - ./live_trades.json:/app/live_trades.json
      - ./bot.log:/app/bot.log
      - ./live_config.py:/app/live_config.py:ro
    network_mode: "host"
    environment:
      - DISPLAY=:99
      - VNC_PORT=5900
      - NOVNC_PORT=6080
      - WINEPREFIX=/root/.wine

  # ── Bot 2 (追加設定) ──────────────────────────────────────
  # ※2つ目のBotを使う時は、以下の # を外してください
  # exness-bot-2:
