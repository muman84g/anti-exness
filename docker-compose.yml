version: "3.8"

services:
  # ── Bot 4 (S7用設定) ──────────────────────────────────────
  exness-bot-7:
    build:
      context: .
      dockerfile: Dockerfile
    image: exness-bot:latest
    container_name: exness-bot-7
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - ./bot7/s7_bot_state.json:/app/bot7/s7_bot_state.json
      - ./bot7/logs:/app/bot7/logs
      - ./bot7/live_config.py:/app/bot7/live_config.py:ro
    network_mode: "host"
    environment:
      - DISPLAY=:99
      - VNC_PORT=5900
      - NOVNC_PORT=6080
      - WINEPREFIX=/root/.wine

  # ── Bot 5 (S5用設定) ──────────────────────────────────────
  exness-bot-5:
    image: exness-bot:latest
    container_name: exness-bot-5
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - ./bot5/s5_bot_state.json:/app/bot5/s5_bot_state.json
      - ./bot5/logs:/app/bot5/logs
      - ./bot5/live_config.py:/app/bot5/live_config.py:ro
    network_mode: "host"
    environment:
      - DISPLAY=:100
      - VNC_PORT=5901
      - NOVNC_PORT=6081
      - WINEPREFIX=/root/.wine
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # ── Bot 6 (S6用設定) ──────────────────────────────────────
