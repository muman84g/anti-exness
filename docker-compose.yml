        max-size: "10m"
        max-file: "5"
    volumes:
      - ./bot6/s6_bot_state.json:/app/bot6/s6_bot_state.json
      - ./bot6/logs:/app/bot6/logs
      - ./bot6/live_config.py:/app/bot6/live_config.py:ro
    network_mode: "host"
    environment:
      - DISPLAY=:101
      - VNC_PORT=5902
      - NOVNC_PORT=6082
      - WINEPREFIX=/root/.wine
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # ── Bot 4 (S4用設定) ──────────────────────────────────────
  exness-bot-4:
    image: exness-bot:latest
    container_name: exness-bot-4
    restart: always
